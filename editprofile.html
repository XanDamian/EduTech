<!DOCTYPE html> 
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content ="width=device-width, initial-scale=1.0">
        <title>Edit profile</title>
        <link rel="stylesheet" href="editprofile.css">
    </head>

    <body>
        <h1>Edit your profile</h1>
        <form action="" method="POST">
            <div>
            <label for="firstname">Edit first name</label>
            <input type="text" id="firstname" name="firstname" value=" Firstname " >
            </div>

            <div>
            <label for="middlename">Edit middle name</label>
            <input type="text" id ="middlename" name="middlename" value=" Middlename " >
            </div>

            <div>
            <label for="lastname">Edit last name</label>
            <input type="text" id="lastname" name="lastname" value=" Lastname " >
            </div>

            <div>
            <label for="email">Email </label>
            <input type="email" id="email" name="email" value="Email" disabled>
            </div>

            <div>
            <label for ="password">Old password</label>
            <input type="password" id="password" name="password" placeholder="Enter old password" >
            </div>

            <div>
            <label for="password">New password</label>
            <input type="password" id="new_password" name="new_password" placeholder="Enter new password" >
            </div>

            <div>
            <button type="submit" >Save changes</button>
            </div>
        </form>
    </body>
</html>
